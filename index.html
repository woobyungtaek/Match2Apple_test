<!DOCTYPE html>
<html lang="en-us">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unity Web Player | Match2Apple</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background-color: #111; /* 여백 배경색 (어두운 회색) */
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      #unity-canvas {
        /* ⭐️ 마법의 비율 계산식! 
           object-fit을 쓰지 않고 캔버스의 '진짜 크기'를 9:16으로 강제합니다.
           이제 화면도 잘리지 않고, 버튼 클릭 위치도 완벽하게 일치합니다. */
        width: 100%;
        height: 100%;
        max-width: calc(100vh * (9 / 16));
        max-height: calc(100vw * (16 / 9));
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>


    <script src="Build/20477f6c8a9a1d73affaf1aa2dbcbecb.loader.js"></script>

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/145f278fc198703b18afd8c634551cf7.data.unityweb",
        frameworkUrl: "Build/31b513dceda1858e81c8bfc94312146a.framework.js.unityweb",
        codeUrl: "Build/623ff470a56e5f85b45231b4bbf51095.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",

      }).then((unityInstance) => {
      }).catch((message) => {

      });
    </script>
  </body>
</html>
